<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dribble de la Mort - Footpédia Arcade</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .games-container { display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .game-box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); text-align: center; border: 3px solid var(--accent-color); width: 100%; max-width: 800px; color: #333; }
        canvas { background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%); border-radius: 10px; cursor: crosshair; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3); margin-top: 20px; border: 2px solid #fff; }
        .btn-retour { display: inline-block; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 8px; margin-bottom: 20px; font-weight: bold; transition: background 0.2s; }
        .btn-retour:hover { background: #555; }
    </style>
</head>
<body>
    <header>
        <h1><img src="../images/logo.png" alt="Logo Footpédia" class="site-logo"> Dribble de la Mort</h1>
        <nav>
            <ul>
                <li><a href="jeux.html">⬅ Retour à l'Arcade</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="games-container">
            <div class="game-box">
                <p><strong>Règles :</strong> Déplace la souris pour esquiver les défenseurs 🛡️. Survis 10 secondes pour ouvrir la voie du but 🟩 !</p>
                <canvas id="dribbleCanvas"></canvas>
            </div>
        </div>
    </main>
    <script src="../js/jeux.js"></script>
</body>
</html>
