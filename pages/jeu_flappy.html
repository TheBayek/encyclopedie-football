<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Ball - Footpédia Arcade</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif;}
        canvas { width: 100vw; height: 100vh; object-fit: contain; background: linear-gradient(180deg, #87CEEB 0%, #4682B4 100%); display: block; }
        .ui-overlay { position: fixed; top: 20px; left: 20px; z-index: 9999; display: flex; gap: 15px; }
        .btn-action { padding: 10px 20px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.5); color: white; border-radius: 8px; text-decoration: none; font-weight: bold; backdrop-filter: blur(5px); transition: all 0.2s; cursor: pointer; }
        .btn-action:hover { background: rgba(255,255,255,1); color: black; border-color: white; transform: scale(1.05); }
        .instructions { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); pointer-events: none; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <a href="jeux.html" class="btn-action">⬅️ Quitter au Menu</a>
        <div class="btn-action" onclick="toggleFullscreen()">📺 [F] Plein Écran</div>
    </div>
    <div class="instructions">Flappy Ball • Clique pour sauter à travers les tuyaux défensifs !</div>
    <canvas id="flappyCanvas"></canvas>
    
    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
            else { document.exitFullscreen(); }
        }
    </script>
    <script src="../js/jeux.js"></script>
</body>
</html>
