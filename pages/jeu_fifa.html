<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIFA Pixel (Pro) - Footpédia Arcade</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #111; overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: #27ae60;
            image-rendering: pixelated;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        /* Menu de Sélection de Niveau */
        #mainMenu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 0; box-sizing: border-box;
            overflow-y: auto;
            pointer-events: auto; z-index: 100;
        }

        #mainMenu h1 {
            color: gold; font-size: 3rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 30px; text-align: center;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 500px;
        }

        .level-btn {
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white; border: 2px solid #fff; border-radius: 10px;
            padding: 20px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
            text-align: center;
        }

        .level-btn.unlocked {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border-color: gold; color: #fff;
        }

        .level-btn.unlocked:hover { transform: scale(1.05); }

        .level-btn.locked {
            opacity: 0.5; cursor: not-allowed;
            background: #555; border-color: #333;
        }

        #backBtn {
            margin-top: 30px; background: #e74c3c;
            padding: 10px 30px; color: white; border-radius: 20px; text-decoration: none; font-weight: bold;
        }

        /* Mobile Controls (visibles s'il y a un touch event) */
        #mobileControls {
            display: none; /* Révélé via JS si tactile */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }

        #joystickZone {
            position: absolute; bottom: 20px; left: 20px;
            width: 150px; height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%; pointer-events: auto;
            touch-action: none; display: flex; align-items: center; justify-content: center;
        }

        #stick {
            width: 50px; height: 50px; background: rgba(255,255,255,0.5);
            border-radius: 50%; position: absolute; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #actionsZone {
            position: absolute; bottom: 30px; right: 30px;
            display: flex; gap: 15px; pointer-events: auto; touch-action: none;
        }

        .action-btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; user-select: none;
        }
        .action-btn:active { background: rgba(255,255,255,0.5); }
        
        #hud {
            position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; font-size: 1.2rem;
            text-shadow: 1px 1px 2px black; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="mainMenu">
        <h1>FIFA PIXEL</h1>
        <p style="color: white; margin-bottom: 20px;">Mode Carrière</p>
        <div class="level-grid" id="levelsGrid">
            <!-- Injecté par JS -->
        </div>
        <a href="jeux.html" id="backBtn">Retour à l'Arcade</a>
    </div>

    <!-- Jeu principal -->
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">Niveau <span id="hudLevel">1</span> | Score: <span id="hudScore">0 - 0</span></div>

    <!-- Contrôles Mobile -->
    <div id="mobileControls">
        <div id="joystickZone">
            <div id="stick"></div>
        </div>
    </div>

    <script src="../js/fifa.js"></script>
    <script>
        // Check for touch device to show mobile controls
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('mobileControls').style.display = 'block';
            // Suggest landscape if portrait
            if(window.innerHeight > window.innerWidth) {
                alert("Pour une meilleure expérience, tourne ton téléphone en mode Paysage ! 🔄");
            }
        }
    </script>
</body>
</html>
